<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Laporan Bulanan Fakultatif</title>
    <style>
        body {
            /*font-family: Arial, sans-serif;*/
            font-size: 1pt;   /* readable in print */
            line-height: 1.4;  /* adds vertical space */
        }
        td {
            font-size: 9pt;
            padding: 2px 4px; /* give breathing room */
            letter-spacing: 1px;
        }

        .section {
            margin-top: 10px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }
    </style>
</head>
<body>

<div style='page-break-before: always;'>
    <div class='container'>
        <div class='section'>
            <p style='font-size: 14px; margin: auto; text-align: center;'><strong>Buku Produksi {{header}}</strong></p>
            <p style='font-size: 14px; margin: auto; text-align: center; padding-bottom: 3em'><strong>PRODUKSI {{tgl_mul}} - {{tgl_akh}}</strong></p>

            <table class='table'>
                <tr>
                    <td style='text-align: center; border: 1px solid'>No</td>
                    <td style='text-align: center; border: 1px solid'>COB</td>
                    <td style='text-align: center; border: 1px solid'>CEDING</td>
                    <td style='text-align: center; border: 1px solid'>NO NOTA</td>
                    <td style='text-align: center; border: 1px solid'>NO. POLIS</td>
                    <td style='text-align: center; border: 1px solid'>NAMA TERTANGGUNG</td>
                    <td style='width: 2%; text-align: center; border: 1px solid'>MTU</td>
                    <td style='width: 7%; text-align: center; border: 1px solid'>GROSS PREMI</td>
                    <td style='width: 7%; text-align: center; border: 1px solid'>KOMISI</td>
                    <td style='width: 7%; text-align: center; border: 1px solid'>KLAIM</td>
                    <td style='width: 7%; text-align: center; border: 1px solid'>NETTO</td>   
                </tr>
                {{data}}
            </table>
        </div>
    </div>
</div>
</body>
</html>
